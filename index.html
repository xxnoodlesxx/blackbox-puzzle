<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKBOX – AI Puzzle Room</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- VIEW: SETUP -->
  <div id="view-setup" class="hidden"></div>

  <!-- VIEW: START -->
  <div id="view-start"></div>

  <!-- VIEW: GAME -->
  <div id="view-game" class="hidden">
    <header id="game-header"></header>
    <main id="challenge-content"></main>
    <div id="hint-area"></div>
  </div>

  <!-- VIEW: END -->
  <div id="view-end" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
